appId: com.subsplashconsulting.F52C3B
---
# Ticket 249: iOS Media tab category grouping and per-category expansion

- launchApp
- waitForAnimationToEnd

# Open Media tab from home
- tapOn:
    text: "Media"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Grouped category UI should be visible (not a flat list)
- extendedWaitUntil:
    visible:
      id: "media-categories-title"
    timeout: 15000
- assertVisible:
    id: "media-categories-title"
- assertVisible:
    id: "media-category-header-files-of-the-month"

# Default preview should show at most 3 messages in each category
- assertNotVisible:
    id: "collection-item-3"

# Expand a category and verify additional item + collapse affordance
- scrollUntilVisible:
    element:
      text: "Show all"
    direction: DOWN
    timeout: 12000
- tapOn:
    text: "Show all"
- waitForAnimationToEnd
- assertVisible:
    text: "Show less"
- assertVisible:
    id: "collection-item-3"

# Navigate to message detail and confirm in-page back button appears
- tapOn:
    id: "collection-item-0"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible:
    id: "page-back-button"

- takeScreenshot:
    path: "maestro/screenshots/ticket-249-media-category-detail"
