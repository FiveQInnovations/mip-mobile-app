appId: com.fiveq.ffci
---

# Ticket 254 verification:
# - Issue 2 is functionally asserted (non-UUID internal URL stays in-app)
# - Issues 1/3/4/5 are captured with deterministic visual checkpoints

# ------------------------------
# Issue 2: Internal non-UUID link resolution parity
# Become a Member page contains links like:
#   https://ffci.fiveq.dev/about/what-we-believe
# This should resolve to UUID and navigate in-app.
# ------------------------------
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 15000
- tapOn:
    text: "Home"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "search-button"
    timeout: 20000

- tapOn:
    id: "search-button"
- extendedWaitUntil:
    visible:
      id: "search-input"
    timeout: 10000
- tapOn:
    id: "search-input"
- inputText: "Become a Member"
- extendedWaitUntil:
    visible:
      id: "search-result-row"
    timeout: 10000
- extendedWaitUntil:
    visible:
      text: "Become a Member"
    timeout: 15000
- tapOn:
    id: "search-result-row"
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Back"
    timeout: 15000
- assertVisible:
    text: "Become a Member"

- scrollUntilVisible:
    element:
      text: "What We Believe"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "What We Believe"
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "What We Believe"
    timeout: 15000
- extendedWaitUntil:
    visible:
      text: "Back"
    timeout: 15000
- assertNotVisible:
    id: "search-input"
- assertVisible:
    text: "What We Believe"

- takeScreenshot:
    path: "maestro/screenshots/ticket-254-issue2-non-uuid-link-resolved"

